[package]
name = "hurl"
version = "8.0.0-SNAPSHOT"
authors = ["Fabrice Reix <fabrice.reix@orange.com>", "Jean-Christophe Amiel <jeanchristophe.amiel@orange.com>", "Filipe Pinto <filipe.pinto@orange.com>"]
edition = "2024"
license = "Apache-2.0"
description = "Hurl, run and test HTTP requests"
documentation = "https://hurl.dev"
homepage = "https://hurl.dev"
repository = "https://github.com/Orange-OpenSource/hurl"
rust-version = "1.94.1"

[lib]
name = "hurl"

[features]
# Re-export of curl/static-ssl: use a bundled OpenSSL version and statically link to it. Only applies on platforms that
# use OpenSSL
static-openssl = ["curl/static-ssl", "curl-sys/static-ssl"]

[dependencies]
base64 = "0.22.1"
brotli = "8.0.2"
chrono = { version = "0.4.44", default-features = false, features = ["clock"] }
clap = { version = "4.6.0", features = ["string", "wrap_help"] }
curl = "0.4.49"
curl-sys = "0.4.87"
encoding_rs = "0.8.35"
glob = "0.3.3"
hurl_core = { version = "8.0.0-SNAPSHOT", path = "../hurl_core" }
libflate = "2.2.1"
libxml = "0.3.8"
md5 = "0.8.0"
percent-encoding = "2.3.2"
regex = "1.12.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", features = ["arbitrary_precision"] }
sha2 = "0.11.0"
url = "2.5.8"
xml = "1.2.1"
# uuid features: lets you generate random UUIDs and use a faster (but still sufficiently random) RNG
uuid = { version = "1.23.0", features = ["v4" , "fast-rng"] }
similar = "3.0.0"
terminal_size = "0.4.4"

[target.'cfg(windows)'.build-dependencies]
winres = "0.1.12"

[build-dependencies]
cc = "1.2.60"

[lints]
workspace = true
