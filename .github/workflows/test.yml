name: test

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        description: "ref branch for this workflow"
        default: "master"
        required: true
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  test-docker-archlinux-x64:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.1
      with:
        persist-credentials: false
        ref: ${{ inputs.branch }}
    - name: Tests
      uses: addnab/docker-run-action@v3
      with:
        image: archlinux
        options: --volume ${{ github.workspace }}:/work --workdir /work --privileged --env CARGO_TERM_COLOR=always
        run: |
          for count in {1..1000} ; do
              curl \
                  --silent \
                  --ipv4 \
                  --max-time 0.5 \
                  --http3 \
                  --head \
                  https://google.com && exit_code=0 || exit_code=1
              echo "ipv4 exit_code=${exit_code}"
          done > /tmp/log
          for count in {1..1000} ; do
              curl \
                  --silent \
                  --ipv6 \
                  --max-time 0.5 \
                  --http3 \
                  --head \
                  https://google.com && exit_code=0 || exit_code=1
              echo "ipv6 exit_code=${exit_code}"
          done >> /tmp/log
          for count in {1..1000} ; do
              curl \
                  --silent \
                  --max-time 0.5 \
                  --http3 \
                  --head \
                  https://google.com && exit_code=0 || exit_code=1
              echo "ipvauto exit_code=${exit_code}"
          done >> /tmp/log
          grep "exit_code=" /tmp/log | sort | uniq -c

          
