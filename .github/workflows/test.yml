name: test

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        description: "ref branch for this workflow"
        default: "master"
        required: true
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  test-docker-archlinux-x64-500:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.1
      with:
        persist-credentials: false
        ref: ${{ inputs.branch }}
    - name: ipv4
      run: |
          for count in {1..10} ; do
              curl \
                  --silent \
                  --ipv4 \
                  --max-time 0.5 \
                  --http3 \
                  --head \
                  https://google.com && exit_code=0 || exit_code=1
              echo "exit_code=${exit_code}"
              sleep 60
          done > /tmp/log
          grep "exit_code=" /tmp/log | sort | uniq -c
    - name: ipvauto
      run: |
          for count in {1..10} ; do
              curl \
                  --silent \
                  --max-time 0.5 \
                  --http3 \
                  --head \
                  https://google.com && exit_code=0 || exit_code=1
              echo "exit_code=${exit_code}"
              sleep 60
          done > /tmp/log
          grep "exit_code=" /tmp/log | sort | uniq -c
